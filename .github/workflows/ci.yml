name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-and-terminal:
    name: Rust and terminal contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out Lantern
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          package-manager-cache: false
      - name: Verify Rust and terminal contracts
        run: ./scripts/check.sh rust terminal

  python-contracts:
    name: Python contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out Lantern
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.26
          enable-cache: true
      - name: Verify deterministic Python contracts
        run: ./scripts/check.sh evaluations semantic-index
