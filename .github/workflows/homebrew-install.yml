name: Homebrew install acceptance

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install:
    name: Install and launch ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Normalize the hosted Homebrew prefix
        run: |
          set -euo pipefail
          for command in 2to3-3.12 idle3.12 pip3.12 pydoc3.12 python3.12 python3.12-config; do
            candidate="$(brew --prefix)/bin/$command"
            if [[ -L $candidate ]] &&
              [[ $(realpath "$candidate") == /Library/Frameworks/Python.framework/Versions/3.12/* ]]; then
              rm "$candidate"
            fi
          done
      - name: Install the public release
        run: brew install e7nt/tap/lantern
      - name: Verify the installed workbench
        run: |
          set -euo pipefail
          installed_version=$(brew info --json=v2 e7nt/tap/lantern |
            jq -r '.formulae[0].versions.stable')
          [[ $(lantern --version) == "lantern $installed_version" ]]
          repo=$(mktemp -d)
          git -C "$repo" init -q
          git -C "$repo" config user.name "Lantern acceptance"
          git -C "$repo" config user.email "acceptance@lantern.local"
          printf 'Lantern Homebrew acceptance\n' >"$repo/README.md"
          git -C "$repo" add README.md
          git -C "$repo" commit -qm "initial"

          session=$(lantern --detached "$repo")
          cleanup() {
            tmux kill-session -t "$session" 2>/dev/null || true
            rm -rf "$repo"
          }
          trap cleanup EXIT

          ready=false
          for attempt in {1..30}; do
            panes=$(tmux list-panes -t "$session" \
              -F '#{pane_title}|#{pane_dead}' 2>/dev/null || true)
            if grep -Fxq 'Explorer|0' <<<"$panes" &&
              grep -Fxq 'Helix|0' <<<"$panes" &&
              grep -Fxq 'Lantern|0' <<<"$panes"; then
              ready=true
              break
            fi
            sleep 1
          done

          if ! $ready; then
            tmux list-panes -t "$session" \
              -F 'title=#{pane_title} dead=#{pane_dead} command=#{pane_current_command}' >&2 || true
            exit 1
          fi

          explorer_pane=$(tmux list-panes -t "$session" \
            -F '#{pane_title}|#{pane_id}' | awk -F '|' '$1 == "Explorer" { print $2 }')
          editor_pane=$(tmux list-panes -t "$session" \
            -F '#{pane_title}|#{pane_id}' | awk -F '|' '$1 == "Helix" { print $2 }')
          tmux send-keys -t "$explorer_pane" Enter
          for attempt in {1..20}; do
            active_title=$(tmux display-message -p -t "$session" '#{pane_title}')
            editor_text=$(tmux capture-pane -p -t "$editor_pane" 2>/dev/null || true)
            if [[ $active_title == Helix ]] &&
              grep -Fq 'Lantern Homebrew acceptance' <<<"$editor_text"; then
              exit 0
            fi
            sleep 1
          done

          tmux list-panes -t "$session" \
            -F 'title=#{pane_title} dead=#{pane_dead} command=#{pane_current_command}' >&2 || true
          exit 1
