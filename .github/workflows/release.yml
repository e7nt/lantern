name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Validate release boundary
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Check out the tagged source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Validate public semantic release
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ $(git cat-file -t "$GITHUB_REF_NAME") == tag ]]
          version=${GITHUB_REF_NAME#v}
          [[ $(<VERSION) == "$version" ]]
          cargo metadata --no-deps --format-version 1 |
            jq -e --arg version "$version" 'all(.packages[]; .version == $version)' >/dev/null
          [[ $(gh repo view "$GITHUB_REPOSITORY" --json visibility --jq .visibility) == PUBLIC ]]
          if [[ -z $TAP_TOKEN ]]; then
            echo "HOMEBREW_TAP_TOKEN is required to update e7nt/homebrew-tap." >&2
            exit 1
          fi

  build:
    name: Package ${{ matrix.arch }}
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - name: Check out the tagged source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          package-manager-cache: false
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.26
          enable-cache: true
      - name: Prepare release runtime
        run: |
          uv python install 3.12
          ./frontend/helix/prepare.sh
      - name: Package release runtime
        run: ./scripts/package-macos.sh "${GITHUB_REF_NAME#v}" dist
      - name: Upload architecture package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lantern-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish release and Homebrew formula
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      GH_TOKEN: ${{ github.token }}
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Check out the tagged source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Download release packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Verify release packages
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 -c ./*.sha256
      - name: Attest release packages
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/*.tar.gz
      - name: Publish immutable assets
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.tar.gz dist/*.sha256 \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --title "$GITHUB_REF_NAME"
      - name: Update e7nt Homebrew tap
        run: |
          set -euo pipefail
          version=${GITHUB_REF_NAME#v}
          base="https://github.com/$GITHUB_REPOSITORY/releases/download/$GITHUB_REF_NAME"
          arm_name="lantern-$version-darwin-arm64.tar.gz"
          intel_name="lantern-$version-darwin-x86_64.tar.gz"
          arm_sha=$(awk '{print $1}' "dist/$arm_name.sha256")
          intel_sha=$(awk '{print $1}' "dist/$intel_name.sha256")
          ./scripts/render-homebrew-formula.sh "$version" \
            "$base/$arm_name" "$arm_sha" \
            "$base/$intel_name" "$intel_sha" >lantern.rb
          content=$(base64 -w 0 lantern.rb)
          current_sha=$(GH_TOKEN="$TAP_TOKEN" gh api \
            repos/e7nt/homebrew-tap/contents/Formula/lantern.rb \
            --jq .sha 2>/dev/null || true)
          if [[ -n $current_sha ]]; then
            jq -n --arg message "lantern $version" --arg content "$content" \
              --arg sha "$current_sha" \
              '{message: $message, content: $content, sha: $sha, branch: "main"}' >tap-update.json
          else
            jq -n --arg message "lantern $version" --arg content "$content" \
              '{message: $message, content: $content, branch: "main"}' >tap-update.json
          fi
          GH_TOKEN="$TAP_TOKEN" gh api --method PUT \
            repos/e7nt/homebrew-tap/contents/Formula/lantern.rb \
            --input tap-update.json >/dev/null
